# Exit Reason Normalization Map
# GPT-HEDGE v7.9 — Phase B.1
#
# Authority: DLE_EPISODE_SCHEMA exit_reason enum (10 canonical values).
# This file is the SOLE mapping from raw exit reasons to canonical vocabulary.
#
# Three source vocabularies exist:
#   1. doctrine_kernel.py  ExitReason enum    (execution authority)
#   2. episode_ledger.py   _extract_exit_reason() strings (legacy logging)
#   3. exit_scanner.py     SeatbeltExitReason enum (tp/sl)
#
# All exit reasons MUST map through normalize_exit_reason() before logging
# to any state surface, ledger, or DLE artifact.
#
# Canonical enum (DLE_EPISODE_SCHEMA — constitutional, do not expand):
#   TAKE_PROFIT, STOP_LOSS, TRAILING_STOP, THESIS_INVALIDATED,
#   REGIME_CHANGE, MANUAL_CLOSE, RISK_VETO, PHASE_END,
#   DECISION_EXPIRED, EMERGENCY_HALT
#
# Status: BINDING
# Established: 2026-02-12
# Revised: 2026-02-13 (B.1 — removed POSITION_FLIP, UNKNOWN; locked canonical)

# ─────────────────────────────────────────────────────────────
# Canonical exit reasons — the single namespace
# ─────────────────────────────────────────────────────────────
#
# Each canonical entry lists all raw strings that map to it.
# The "raw" list is exhaustive: if a string is not listed, it is unmapped.

canonical:
  EMERGENCY_HALT:
    description: "Crisis-level forced exit — Sentinel-X crisis override"
    priority: 1
    category: crisis
    raw:
      - "CRISIS_OVERRIDE"     # doctrine_kernel ExitReason
      - "crisis"              # episode_ledger string

  REGIME_CHANGE:
    description: "Regime invalidated position thesis — direction no longer permitted"
    priority: 2
    category: regime
    raw:
      - "REGIME_FLIP"                    # doctrine_kernel ExitReason
      - "REGIME_CONFIDENCE_COLLAPSE"     # doctrine_kernel ExitReason
      - "regime_flip"                    # episode_ledger string

  THESIS_INVALIDATED:
    description: "Position thesis no longer valid — structural alpha failure"
    priority: 3
    category: structural
    raw:
      - "TREND_DECAY"              # doctrine_kernel ExitReason
      - "CARRY_DISAPPEARED"        # doctrine_kernel ExitReason
      - "CROSSFIRE_RESOLVED"       # doctrine_kernel ExitReason
      - "EXECUTION_ALPHA_DRAG"     # doctrine_kernel ExitReason
      - "thesis"                   # episode_ledger string
      - "signal_close"             # episode_ledger string (signal reversal)
      - "position_flip"            # episode_ledger string (flip is consequence, cause is thesis)

  DECISION_EXPIRED:
    description: "Position exceeded maximum holding period"
    priority: 4
    category: time
    raw:
      - "TIME_STOP"        # doctrine_kernel ExitReason
      - "time_stop"        # episode_ledger string

  STOP_LOSS:
    description: "Seatbelt stop-loss — catastrophe protection only, not strategy"
    priority: 5
    category: seatbelt
    raw:
      - "STOP_LOSS_SEATBELT"   # doctrine_kernel ExitReason
      - "sl"                   # episode_ledger string / SeatbeltExitReason

  TAKE_PROFIT:
    description: "Target price reached — execution-level exit"
    priority: 6
    category: target
    raw:
      - "tp"               # episode_ledger string / SeatbeltExitReason

  TRAILING_STOP:
    description: "Trailing stop triggered — risk-managed profit protection"
    priority: 6
    category: target
    raw:
      - "trailing"         # episode_ledger string (forward reservation)

  RISK_VETO:
    description: "Risk module forced exit — bypasses doctrine kernel"
    priority: 1
    category: risk
    raw:
      - "risk"             # episode_ledger string

  MANUAL_CLOSE:
    description: "Operator-initiated manual close"
    priority: 7
    category: manual
    raw:
      - "manual"           # episode_ledger string

  PHASE_END:
    description: "Administrative phase boundary — all positions closed"
    priority: 7
    category: administrative
    raw:
      - "phase_end"        # episode_ledger string

# ─────────────────────────────────────────────────────────────
# Unmapped handling
# ─────────────────────────────────────────────────────────────
#
# If a raw reason is not in any canonical.*.raw list:
#   SHADOW mode  → log anomaly metric, fallback to THESIS_INVALIDATED
#   ENFORCED mode → deny episode emission (future Phase B enforcement)
#
# "unknown" raw string is treated as unmapped (not a canonical entry).
# "HOLD" must NEVER appear in exit pipeline — assert at normalization boundary.
