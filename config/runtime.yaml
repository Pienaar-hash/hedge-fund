# =======================
#   v7.6 Canonical Runtime Configuration
# =======================

# Inception baseline (soft reference for display only)
# NOT used for risk calculations or veto logic
inception:
  nav: 10760.00
  ts: "2026-01-28T00:00:00Z"
  mode: soft_reference  # display only, no risk impact
  source: first_recorded_nav

# Runtime environment settings
runtime:
  env: production
  dry_run: false
  enable_dashboard: true
  state_dir: logs/state
  loop_sleep_seconds: 5
  max_loops: null
  logging_level: INFO
  version_file: VERSION

# Service definitions (v7.6 canonical set)
services:
  executor:
    enabled: true
  dashboard:
    enabled: true
  sync_state:
    enabled: true

# Canonical state paths (v7.6 State Contract)
state_paths:
  nav: logs/state/nav.json
  nav_state: logs/state/nav_state.json
  positions_state: logs/state/positions_state.json
  positions_ledger: logs/state/positions_ledger.json
  diagnostics: logs/state/diagnostics.json
  risk_snapshot: logs/state/risk_snapshot.json
  router_health: logs/state/router_health.json
  symbol_scores: logs/state/symbol_scores_v6.json
  factor_diagnostics: logs/state/factor_diagnostics.json
  engine_metadata: logs/state/engine_metadata.json
  kpis_v7: logs/state/kpis_v7.json

# =======================
#   Trading Window
# =======================
trading_window:
  start_utc: 6    # v6.4: expanded from 10 - 06:00 UTC shows +$3/trade
  end_utc: 17     # v6.4: expanded from 16 - capture full EU/US overlap
  # Avoid 01:00-04:00 UTC (Asian session showed -$28/trade avg)
  disabled_days: [5, 6]  # v6.4: disable Sat/Sun (-$40.86 on Sat)

# Router configuration
router:
  # TWAP execution for large orders (v7.4 C1)
  twap:
    enabled: true
    min_notional_usd: 500.0    # minimum gross USD notional to trigger TWAP
    slices: 4                   # number of child orders per TWAP execution
    interval_seconds: 10        # sleep time between slices
  # Slippage model settings (v7.5 B1)
  slippage:
    enabled: true
    ewma_halflife_trades: 50      # EWMA halflife in number of trades
    max_expected_slippage_bps: 15 # optional future veto use
    depth_levels: 5               # order book levels to sample for expected cost
    spread_pause_factor: 1.5      # pause TWAP slice if spread > factor * bucket.max_spread_bps

# Directional bias based on performance data
directional_bias:
  # LONG: +$105 (85% WR), SHORT: -$125 (69% WR)
  # Disable shorts for symbols with negative short PnL
  short_disabled_symbols:
    - LTCUSDT   # -$97 on shorts, +$60 on longs
    - SUIUSDT   # -$24 on shorts, +$14 on longs  
    - LINKUSDT  # -$15 on shorts, +$11 on longs
  long_only_mode: false  # set true to disable all shorts
offpeak:
  max_concurrent_orders: 2
  min_child_notional: 50
priority:
  max_concurrent_orders: 6
  min_child_notional: 25
execution:
  max_transient_retries: 1
  transient_retry_backoff_s: 1.0
  error_cooldown_sec: 60
nav:
  include_assets:
    - USDT
    - USDC
    - BTC
  use_mark_price: true
risk:
  reset_peak_on_testnet: true
  peak_stale_seconds: 600
# Signal gate tunables
signal_gate:
  atr_lookback: 50
  atr_mult: 8.0          # multiplier vs median ATR; increase to allow higher vol
  expectancy_min: -0.10  # minimum rolling expectancy to allow trade
# v7.9-E2: Anti-churn safety rails
churn_guard:
  min_hold_seconds: 120      # 2-minute minimum hold before exits allowed
  cooldown_seconds: 300      # 5-minute cooldown after exit before re-entry
  crisis_override: true      # CRISIS_OVERRIDE / SEATBELT bypass min_hold

# v7.9-E2: Fee-aware edge gate (entries only)
fee_gate:
  taker_fee_rate: 0.0004     # Binance futures taker fee (0.04%)
  maker_fee_rate: 0.0002     # Binance futures maker fee (0.02%)
  fee_buffer_mult: 1.5       # Require 1.5x round-trip fee as edge
  enabled: true

# v7.9-TE1: True Edge v1 — ATR × confidence mapping
# Replaces proxy edge (confidence-0.5) with expected dollar edge.
# When ATR is unavailable, falls back to proxy with edge_source=fallback_proxy.
true_edge:
  adv_cap: 0.25              # Max advantage clamp (25pp above 50%)
  k_atr: 0.6                 # Default ATR scalar (conservative for m15)
  k_atr_by_timeframe:
    m5: 0.4
    m15: 0.6
    h1: 0.8
    h4: 1.0
    d1: 1.2
  min_atr_pct: 0.0001        # Below 0.01% → ATR stale, use fallback
  spread_slippage_bps: 0.0   # Optional spread+slippage deduction (bps)
  enabled: true

# v7.9-E2.2: Exit intent dedup (stops REGIME_FLIP spam)
exit_dedup:
  ttl_seconds: 300            # 5-minute dedup window per symbol/side/reason
  qty_change_threshold: 0.10  # >10% qty change bypasses dedup
  enabled: true

# v7.9-CW: Calibration Window — Episode-Capped Trading Gate
# Enables a bounded trading window for expectancy calibration.
# When episode_cap is reached, KILL_SWITCH auto-activates.
# DUAL-KEY: requires BOTH enabled=true AND env CALIBRATION_WINDOW_ACK=1
# To activate: set enabled=true, start_ts, DRY_RUN=0, CALIBRATION_WINDOW_ACK=1, restart.
calibration_window:
  enabled: true
  episode_cap: 30               # halt after 30 new episodes
  start_ts: "2026-02-22T07:53:26Z"  # activation timestamp
  drawdown_kill_pct: 0.05       # 5% NAV drawdown → immediate halt
  per_trade_nav_pct: 0.005      # 0.5% NAV per trade (reduced from 1.5%)

# v8.0: Activation Window — Full-Stack System Certification Protocol
# 14-day time-bounded window covering futures + DLE + Binary Lab + telemetry.
# Proves full-stack integrity before capital scale.
# DUAL-KEY: requires BOTH enabled=true AND env ACTIVATION_WINDOW_ACK=1
# Structural integrity kills: manifest drift, config hash mismatch, DLE bypass,
# binary lab freeze violation, drawdown breach — not just sizing.
activation_window:
  enabled: false                        # flip to true when ready to start
  duration_days: 14                     # 14 consecutive calendar days
  start_ts: ""                          # set to UTC time at activation
  drawdown_kill_pct: 0.05              # 5% NAV drawdown → immediate halt
  per_trade_nav_pct: 0.005             # 0.5% NAV per trade (unchanged)
  require_go_for_scale: true           # sizing cap persists until 7/7 GO verdict
  # Scope: executor, risk, DLE veto, Binary Lab SHADOW, episode ledger,
  #        NAV accounting, manifest surface integrity